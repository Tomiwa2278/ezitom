<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev.folio | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600&family=Syne:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
            padding: 2rem;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            width: 60px;
            margin-bottom: 1.5rem;
        }

        .auth-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text2);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            color: var(--text2);
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent);
            outline: none;
            background: rgba(255, 255, 255, 0.05);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text2);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--accent);
            text-decoration: none;
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: inherit;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text2);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .alert-error {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.2);
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HVT5JRQRH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7HVT5JRQRH');
    </script>
</head>

<body>

    <div class="auth-card">
        <div class="auth-header">
            <img src="images/logo/Logo-1.png" alt="Logo" class="auth-logo">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Please enter your details to sign in</p>
        </div>

        <div id="alert" class="alert alert-error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Gmail Address</label>
                <input type="email" id="email" class="form-input" placeholder="admin@gmail.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-options">
                <label class="checkbox-group">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="auth-btn">Sign in</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        // Synchronize accounts from Google Sheets on load
        AuthManager.syncAccountsFromServer();

        // Redirect already-authenticated admins directly to the dashboard
        if (AuthManager.isAuthenticated()) {
            window.location.href = 'admin.html';
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const alertEl = document.getElementById('alert');

            const result = AuthManager.login(email, password, rememberMe);

            if (result.success) {
                if (result.isAdmin) {
                    // Authorized admin — go to dashboard
                    window.location.href = 'admin.html';
                }
                // Non-admin users: login accepted silently, no redirect, no error shown
            } else {
                alertEl.textContent = result.message;
                alertEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
